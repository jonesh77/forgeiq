<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="Arial, sans-serif">
  <defs>
    <filter id="sh5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="500" fill="#fafbfc"/>

  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#0f172a">Mesh Quality Grades A–D</text>
  <text x="600" y="80" text-anchor="middle" font-size="14" fill="#64748b">Automated mesh evaluation in 3D Preform — informs you BEFORE downstream simulation</text>

  <!-- Grade A -->
  <g filter="url(#sh5)">
    <rect x="60" y="130" width="260" height="320" rx="12" fill="white" stroke="#10b981" stroke-width="3"/>
    <rect x="60" y="130" width="260" height="60" rx="12" fill="#10b981"/>
    <text x="190" y="170" text-anchor="middle" font-size="32" font-weight="bold" fill="white">A</text>
    <text x="190" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#065f46">Production-ready</text>
    <text x="190" y="260" text-anchor="middle" font-size="13" fill="#374151">✓ Watertight</text>
    <text x="190" y="285" text-anchor="middle" font-size="13" fill="#374151">✓ Manifold</text>
    <text x="190" y="310" text-anchor="middle" font-size="13" fill="#374151">✓ Thin walls OK</text>
    <text x="190" y="335" text-anchor="middle" font-size="13" fill="#374151">✓ Euler/genus pass</text>
    <text x="190" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">Use directly</text>
    <text x="190" y="420" text-anchor="middle" font-size="11" fill="#64748b">3D print, CNC, FEM</text>
  </g>

  <!-- Grade B -->
  <g filter="url(#sh5)">
    <rect x="345" y="130" width="260" height="320" rx="12" fill="white" stroke="#3b82f6" stroke-width="3"/>
    <rect x="345" y="130" width="260" height="60" rx="12" fill="#3b82f6"/>
    <text x="475" y="170" text-anchor="middle" font-size="32" font-weight="bold" fill="white">B</text>
    <text x="475" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">Good</text>
    <text x="475" y="260" text-anchor="middle" font-size="13" fill="#374151">✓ Watertight</text>
    <text x="475" y="285" text-anchor="middle" font-size="13" fill="#374151">✓ Manifold</text>
    <text x="475" y="310" text-anchor="middle" font-size="13" fill="#374151">⚠ Minor wall thinning</text>
    <text x="475" y="335" text-anchor="middle" font-size="13" fill="#374151">✓ Volume reasonable</text>
    <text x="475" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">Use with check</text>
    <text x="475" y="420" text-anchor="middle" font-size="11" fill="#64748b">Review thin areas</text>
  </g>

  <!-- Grade C -->
  <g filter="url(#sh5)">
    <rect x="630" y="130" width="260" height="320" rx="12" fill="white" stroke="#f59e0b" stroke-width="3"/>
    <rect x="630" y="130" width="260" height="60" rx="12" fill="#f59e0b"/>
    <text x="760" y="170" text-anchor="middle" font-size="32" font-weight="bold" fill="white">C</text>
    <text x="760" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">Usable</text>
    <text x="760" y="260" text-anchor="middle" font-size="13" fill="#374151">⚠ May not be watertight</text>
    <text x="760" y="285" text-anchor="middle" font-size="13" fill="#374151">⚠ Some non-manifold edges</text>
    <text x="760" y="310" text-anchor="middle" font-size="13" fill="#374151">⚠ Aspect ratio off</text>
    <text x="760" y="335" text-anchor="middle" font-size="13" fill="#374151">⚠ Genus &gt; 0</text>
    <text x="760" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="#f59e0b">Needs review</text>
    <text x="760" y="420" text-anchor="middle" font-size="11" fill="#64748b">Post-process in MeshLab</text>
  </g>

  <!-- Grade D -->
  <g filter="url(#sh5)">
    <rect x="915" y="130" width="260" height="320" rx="12" fill="white" stroke="#ef4444" stroke-width="3"/>
    <rect x="915" y="130" width="260" height="60" rx="12" fill="#ef4444"/>
    <text x="1045" y="170" text-anchor="middle" font-size="32" font-weight="bold" fill="white">D</text>
    <text x="1045" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">Has problems</text>
    <text x="1045" y="260" text-anchor="middle" font-size="13" fill="#374151">✗ Not watertight</text>
    <text x="1045" y="285" text-anchor="middle" font-size="13" fill="#374151">✗ Non-manifold</text>
    <text x="1045" y="310" text-anchor="middle" font-size="13" fill="#374151">✗ Holes / inverted normals</text>
    <text x="1045" y="335" text-anchor="middle" font-size="13" fill="#374151">✗ Wall thickness fail</text>
    <text x="1045" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">Re-run needed</text>
    <text x="1045" y="420" text-anchor="middle" font-size="11" fill="#64748b">Try Advanced mode</text>
  </g>
</svg>
