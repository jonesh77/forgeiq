<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Arial, sans-serif">
  <defs>
    <filter id="sh6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="#fafbfc"/>

  <text x="600" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#0f172a">Total Cost of Ownership</text>
  <text x="600" y="80" text-anchor="middle" font-size="14" fill="#64748b">Production deployment for under $12/month — competitive with home internet</text>

  <!-- Pie chart -->
  <g transform="translate(280, 340)">
    <!-- Hetzner (88.4%) - blue -->
    <path d="M 0,-180 A 180,180 0 1 1 -20.5,179 L 0,0 Z" fill="#3b82f6" filter="url(#sh6)"/>
    <!-- Domain (11.1%) - amber -->
    <path d="M -20.5,179 A 180,180 0 0 1 -0.01,-180 L 0,0 Z" fill="#f59e0b" filter="url(#sh6)"/>
    <!-- Center -->
    <circle r="65" fill="white"/>
    <text y="-5" text-anchor="middle" font-size="14" fill="#64748b">Per month</text>
    <text y="20" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">$11.25</text>
    <text y="40" text-anchor="middle" font-size="11" fill="#64748b">~$135/year</text>
  </g>

  <!-- Legend / breakdown -->
  <g transform="translate(600, 130)">
    <text x="0" y="0" font-size="20" font-weight="bold" fill="#0f172a">Monthly breakdown</text>

    <g transform="translate(0, 40)">
      <rect width="20" height="20" fill="#3b82f6" rx="4"/>
      <text x="35" y="16" font-size="15" font-weight="bold" fill="#0f172a">Hetzner CPX22 (Backend)</text>
      <text x="35" y="35" font-size="12" fill="#64748b">3 vCPU · 4 GB RAM · 80 GB SSD · Falkenstein</text>
      <text x="510" y="20" text-anchor="end" font-size="16" font-weight="bold" fill="#3b82f6">$10/mo</text>
    </g>

    <g transform="translate(0, 100)">
      <rect width="20" height="20" fill="#f59e0b" rx="4"/>
      <text x="35" y="16" font-size="15" font-weight="bold" fill="#0f172a">Domain (forgeiq.dev)</text>
      <text x="35" y="35" font-size="12" fill="#64748b">$15/year ÷ 12 (Cloudflare Registrar)</text>
      <text x="510" y="20" text-anchor="end" font-size="16" font-weight="bold" fill="#f59e0b">$1.25/mo</text>
    </g>

    <g transform="translate(0, 160)">
      <rect width="20" height="20" fill="#10b981" rx="4"/>
      <text x="35" y="16" font-size="15" font-weight="bold" fill="#0f172a">Vercel (Frontend)</text>
      <text x="35" y="35" font-size="12" fill="#64748b">Hobby Free plan · 100 GB bandwidth/mo</text>
      <text x="510" y="20" text-anchor="end" font-size="16" font-weight="bold" fill="#10b981">$0</text>
    </g>

    <g transform="translate(0, 220)">
      <rect width="20" height="20" fill="#10b981" rx="4"/>
      <text x="35" y="16" font-size="15" font-weight="bold" fill="#0f172a">MongoDB Atlas M0</text>
      <text x="35" y="35" font-size="12" fill="#64748b">Free tier · 512 MB · Seoul region</text>
      <text x="510" y="20" text-anchor="end" font-size="16" font-weight="bold" fill="#10b981">$0</text>
    </g>

    <g transform="translate(0, 280)">
      <rect width="20" height="20" fill="#10b981" rx="4"/>
      <text x="35" y="16" font-size="15" font-weight="bold" fill="#0f172a">Google Gemini API</text>
      <text x="35" y="35" font-size="12" fill="#64748b">Free tier · 1500 requests/day</text>
      <text x="510" y="20" text-anchor="end" font-size="16" font-weight="bold" fill="#10b981">$0</text>
    </g>

    <g transform="translate(0, 340)">
      <rect width="20" height="20" fill="#10b981" rx="4"/>
      <text x="35" y="16" font-size="15" font-weight="bold" fill="#0f172a">Cloudflare DNS</text>
      <text x="35" y="35" font-size="12" fill="#64748b">Free forever · unlimited queries</text>
      <text x="510" y="20" text-anchor="end" font-size="16" font-weight="bold" fill="#10b981">$0</text>
    </g>

    <line x1="0" y1="400" x2="540" y2="400" stroke="#cbd5e1" stroke-width="1"/>

    <g transform="translate(0, 420)">
      <text x="0" y="20" font-size="18" font-weight="bold" fill="#0f172a">TOTAL per month</text>
      <text x="540" y="20" text-anchor="end" font-size="22" font-weight="bold" fill="#0f172a">$11.25</text>
    </g>

    <text y="455" font-size="11" font-style="italic" fill="#64748b">Compare: AWS equivalent ≈ $50-100/mo · Google Cloud ≈ $40-80/mo</text>
  </g>
</svg>
