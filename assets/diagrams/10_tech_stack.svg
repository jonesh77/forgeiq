      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Vercel</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">Hobby Free</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Frontend hosting</text>
    </g>

    <!-- Hetzner -->
    <g transform="translate(480, 505)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#d50c2d">Hetzner</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">Cloud CPX22</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Backend hosting</text>
    </g>

    <!-- Docker -->
    <g transform="translate(80, 625)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#2496ed">Docker</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">+ Compose</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Reproducible</text>
    </g>

    <!-- Caddy -->
    <g transform="translate(280, 625)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f88c0">Caddy v2</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">+ Let's Encrypt</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">HTTPS auto</text>
    </g>

    <!-- Cloudflare -->
    <g transform="translate(480, 625)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="14" font-weight="bold" fill="#f48120">Cloudflare</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">DNS + domain</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">forgeiq.dev</text>
    </g>
