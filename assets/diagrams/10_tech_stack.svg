<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Arial, sans-serif">
  <defs>
    <filter id="sh10" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1400" height="800" fill="#fafbfc"/>

  <text x="700" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a">Technology Stack — Built on Modern Open-Source</text>
  <text x="700" y="65" text-anchor="middle" font-size="13" fill="#64748b">All free / open-source · No vendor lock-in · Reproducible deploys</text>

  <!-- Frontend Section -->
  <g filter="url(#sh10)">
