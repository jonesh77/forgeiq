      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">Atlas M0 (free)</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Seoul region</text>
    </g>

