  <!-- AI Section -->
  <g filter="url(#sh10)">
    <rect x="710" y="440" width="640" height="320" rx="12" fill="white" stroke="#a855f7" stroke-width="2"/>
    <rect x="710" y="440" width="640" height="40" rx="12" fill="#a855f7"/>
    <text x="730" y="465" font-size="18" font-weight="bold" fill="white">🤖 AI ASSISTANT (multi-provider)</text>

    <!-- Gemini -->
    <g transform="translate(740, 505)">
      <rect width="280" height="100" rx="6" fill="#0f172a"/>
      <text x="140" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#4285f4">Google Gemini</text>
      <text x="140" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">2.5-flash → 2.0-flash → flash-latest</text>
      <text x="140" y="80" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="bold">Primary · 1500 req/day free</text>
    </g>

    <!-- OpenAI -->
    <g transform="translate(1040, 505)">
      <rect width="280" height="100" rx="6" fill="#0f172a"/>
      <text x="140" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">OpenAI</text>
      <text x="140" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">GPT models</text>
      <text x="140" y="80" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="bold">Fallback #1</text>
    </g>

    <!-- Anthropic -->
    <g transform="translate(740, 625)">
      <rect width="280" height="100" rx="6" fill="#0f172a"/>
      <text x="140" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#d4a574">Anthropic Claude</text>
      <text x="140" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">Claude 4.x models</text>
      <text x="140" y="80" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="bold">Fallback #2</text>
    </g>

    <!-- Local FAQ -->
    <g transform="translate(1040, 625)">
      <rect width="280" height="100" rx="6" fill="#0f172a"/>
      <text x="140" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Local FAQ</text>
      <text x="140" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">Keyword matching</text>
      <text x="140" y="80" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">Last resort (offline)</text>
    </g>
