    <rect x="50" y="100" width="640" height="40" rx="12" fill="#0ea5e9"/>
    <text x="70" y="125" font-size="18" font-weight="bold" fill="white">🌐 FRONTEND</text>

    <!-- Next.js -->
    <g transform="translate(80, 165)">
      <rect width="180" height="100" rx="6" fill="#000" />
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Next.js</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">v15 (App Router)</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">SSR + CSR hybrid</text>
    </g>

    <!-- React -->
    <g transform="translate(280, 165)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#61dafb">React</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">v19 + TypeScript</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Component UI</text>
    </g>

    <!-- Tailwind -->
    <g transform="translate(480, 165)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#06b6d4">Tailwind</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">v4 + Shadcn UI</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Utility CSS</text>
    </g>

    <!-- Three.js -->
    <g transform="translate(80, 285)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Three.js</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">STL viewer</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">WebGL 3D</text>
    </g>

    <!-- Plotly -->
    <g transform="translate(280, 285)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#3b82f6">Plotly.js</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">Contour charts</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Interactive plots</text>
    </g>

    <!-- iron-session -->
    <g transform="translate(480, 285)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
