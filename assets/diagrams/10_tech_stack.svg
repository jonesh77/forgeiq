    <g transform="translate(940, 165)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#ff6f00">TensorFlow</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">v2.13 + Keras</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">3D U-Net inference</text>
    </g>

    <!-- scikit-learn -->
    <g transform="translate(1140, 165)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="#f7931e">scikit-learn</text>
      <text x="90" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">+ XGBoost</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Cogging MLP/GB</text>
    </g>

    <!-- SciPy -->
    <g transform="translate(740, 285)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#8caaee">SciPy</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">Optimization</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">trust-constr</text>
    </g>

    <!-- pymeshlab -->
    <g transform="translate(940, 285)">
      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="32" text-anchor="middle" font-size="14" font-weight="bold" fill="white">pymeshlab</text>
      <text x="90" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">+ PyVista</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">STL smoothing</text>
    </g>

