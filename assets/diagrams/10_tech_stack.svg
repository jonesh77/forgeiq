      <rect width="180" height="100" rx="6" fill="#0f172a"/>
      <text x="90" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Flask</text>
      <text x="90" y="55" text-anchor="middle" font-size="11" fill="#94a3b8">Python web framework</text>
      <text x="90" y="80" text-anchor="middle" font-size="10" fill="#cbd5e1">Waitress WSGI</text>
    </g>

