name: 🐞 Bug report
description: Report a reproducible bug in ForgeIQ — AI Metallurgy Simulation Platform
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more reproducible the case, the faster it can be fixed.

  - type: dropdown
    id: area
    attributes:
      label: Which program / area?
      options:
        - Cogging (MLP / Gradient Boosting / Train data correction)
        - Processing Map (Main graph / PINN / Strain plots)
        - Pass Schedule (Optimizer / Feasibility)
        - 3D Preform (Voxel → STL / Quality grading)
        - Auto Pipeline (Workflow)
        - Compare
        - Auth (Login / Register / Password reset / Settings)
        - AI Assistant
        - History / Messages / Bookmarks
        - i18n (English / Uzbek / Korean)
        - Deployment / Docker / Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you do, what did you see, what did you expect?
      placeholder: |
        1. Went to /3d_preform
        2. Uploaded sample target_node + target_elem files
        3. Clicked "Generate 3D model"
        4. Got an error: "..." instead of a 3D model
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact clicks / inputs. If possible, attach a sample input that triggers the issue.
      placeholder: |
        - URL: https://forgeiq.dev/3d_preform
        - Inputs: ASTM=6, weight_factor=0.1
        - Browser: Chrome 130 / Windows 11
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you think should happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Drag & drop screenshots, console output, or error JSON here.

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which release or commit are you running? (visible in the page footer once added)
      placeholder: v0.1.0-beta

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Live site (forgeiq.dev)
        - Self-hosted (Docker)
        - Self-hosted (manual / dev mode)
        - run.exe / run_first_time.exe (Windows launcher)
    validations:
      required: true
